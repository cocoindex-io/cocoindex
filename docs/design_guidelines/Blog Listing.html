<style>
  /* Re-paths because this page lives one level above shared.css */
  /* shared.css @imports ../../colors_and_type.css — that won't resolve here. */
  /* We loaded colors_and_type.css directly above, so override the broken import path by re-linking the vars locally. */

  .blog-hero-top{
    padding: 64px 0 32px;
    border-bottom: 1px solid var(--rule);
  }
  .blog-hero-top .bits{
    display:flex; align-items:flex-end; justify-content:space-between;
    gap:32px; flex-wrap:wrap;
    margin-bottom: 40px;
  }
  .blog-hero-top h1{
    font-family: var(--serif); font-weight:400;
    font-size: clamp(52px, 6.4vw, 88px); line-height:1.0; letter-spacing:-0.035em;
    margin: 12px 0 0; max-width: 12ch;
    padding-bottom: 0.1em;
  }
  .blog-hero-top h1 em{font-style:italic; color:var(--coral);}
  .blog-hero-top .sub{
    max-width: 38ch; font-size:17px; color: var(--maroon-ink);
    margin: 0;
  }
  .blog-hero-top .count{
    font-family: var(--mono); font-size:11px; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--muted);
    padding-top: 14px; border-top: 1px solid var(--rule-strong);
    display:flex; gap:18px;
  }
  .blog-hero-top .count b{color:var(--maroon); font-weight:500;}

  /* controls bar */
  .controls{
    padding: 28px 0;
    border-bottom: 1px solid var(--rule);
    background: var(--cream-soft);
    position: sticky; top: 57px; z-index: 20;
    backdrop-filter: blur(12px);
    background: color-mix(in oklab, var(--cream-soft) 92%, transparent);
  }
  .controls .row{
    display:flex; align-items:center; gap:20px; flex-wrap:wrap;
  }
  .search{
    flex: 1 1 340px; max-width: 440px;
    display:flex; align-items:center; gap:10px;
    padding: 10px 14px; border-radius: 999px;
    background: var(--paper);
    border: 1px solid var(--rule);
    font-size: 14px;
  }
  .search:focus-within{border-color: var(--maroon); background: #fff;}
  .search input{
    border:0; outline:0; background: transparent; flex:1;
    font: inherit; color: var(--maroon-ink);
  }
  .search input::placeholder{color: var(--muted);}
  .search .kb{
    font-family: var(--mono); font-size:11px; color:var(--muted);
    padding:2px 8px; background: var(--cream); border:1px solid var(--rule);
    border-radius:3px;
  }

  .tags{display:flex; gap:6px; flex-wrap:wrap; align-items:center;}
  .tag-btn{
    font-family: var(--mono); font-size:11px; letter-spacing:0.12em; text-transform:uppercase;
    padding: 7px 14px; border-radius: 999px;
    border: 1px solid var(--rule); background: var(--paper); color: var(--maroon-ink);
    cursor: pointer; transition: background .15s, color .15s, border-color .15s;
    display:inline-flex; align-items:center; gap:6px;
  }
  .tag-btn:hover{border-color: var(--maroon); color: var(--maroon);}
  .tag-btn.on{background: var(--maroon); color: var(--cream); border-color: var(--maroon);}
  .tag-btn .n{
    font-family: var(--mono); font-size:10px;
    background: rgba(42,18,27,0.08); padding:1px 6px; border-radius:99px;
    color: var(--muted);
  }
  .tag-btn.on .n{background: rgba(252,243,216,0.2); color: var(--cream);}

  .view-toggle{
    display:inline-flex; padding:3px; border-radius: 999px;
    border: 1px solid var(--rule); background: var(--paper);
  }
  .view-toggle button{
    border:0; background: transparent; cursor:pointer;
    font: inherit; padding: 6px 12px; border-radius: 999px;
    font-family: var(--mono); font-size:11px; letter-spacing:0.12em; text-transform:uppercase;
    color: var(--muted);
  }
  .view-toggle button.on{background: var(--coral); color: var(--cream);}

  /* main canvas */
  main.list{padding: 48px 0 96px;}

  /* featured */
  .featured{
    display: grid; grid-template-columns: 1.35fr 1fr;
    gap: 0; border:1px solid var(--rule-strong); border-radius: 10px;
    overflow: hidden; background: var(--cream);
    margin-bottom: 48px;
    transition: transform .2s, box-shadow .2s;
    cursor: pointer;
  }
  .featured:hover{transform: translateY(-3px); box-shadow: 0 24px 60px -28px rgba(42,18,27,0.3);}
  .featured .thumb{
    aspect-ratio: 16/10;
    position: relative; overflow: hidden;
  }
  .featured .thumb .tag{
    position:absolute; top:18px; left:18px; z-index:3;
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--cream); padding: 7px 14px 7px 12px;
    background: var(--maroon); border-radius: 999px;
    box-shadow: 0 2px 12px rgba(42,18,27,0.35);
    display:flex; gap:8px; align-items:center;
    font-weight: 500;
  }
  .featured .thumb .tag::before{
    content:""; width:6px; height:6px; border-radius:50%; background: var(--palm);
  }
  .featured .body{
    padding: 44px 48px 36px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .featured .meta{
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted);
    display:flex; gap:14px; flex-wrap:wrap;
  }
  .featured h2{
    font-family: var(--sans); font-weight: 600;
    font-size: clamp(26px, 2.8vw, 36px); line-height: 1.1; letter-spacing: -0.025em;
    margin: 0; max-width: 20ch;
  }
  .featured h2 em{font-style: normal; color: var(--coral);}
  .featured p{
    font-size: 17px; line-height: 1.55; color: var(--maroon-ink);
    margin: 0; max-width: 52ch;
  }
  .featured .read{
    margin-top: auto; padding-top: 20px; border-top: 1px solid var(--rule);
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--coral);
    display:flex; justify-content: space-between; align-items:center;
  }

  /* grid */
  .grid{
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
  }
  @media (max-width: 960px){ .grid{grid-template-columns: repeat(2, 1fr);} }
  @media (max-width: 640px){ .grid{grid-template-columns: 1fr;} }

  article.post{
    border: 1px solid var(--rule-strong); border-radius: 8px;
    background: var(--cream); overflow: hidden;
    display: flex; flex-direction: column;
    transition: transform .2s, box-shadow .2s;
    cursor: pointer;
  }
  article.post:hover{transform: translateY(-4px); box-shadow: 0 16px 40px -18px rgba(42,18,27,0.25);}
  article.post .thumb{
    aspect-ratio: 16/10; position: relative; overflow: hidden;
    display: grid; place-items: center;
  }
  article.post .thumb .tag{
    position:absolute; top:12px; left:12px; z-index:3;
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--cream); padding: 5px 11px;
    background: var(--maroon); border-radius: 999px;
    box-shadow: 0 2px 10px rgba(42,18,27,0.3);
    font-weight: 500;
  }
  article.post .thumb .glyph{
    font-family: var(--serif); font-style: italic;
    color: var(--cream); opacity: 0.9;
    font-size: 40px; position:relative; z-index:2; text-align:center;
    padding: 0 20px;
  }
  article.post .body{
    padding: 22px 22px 20px; display: flex; flex-direction: column; gap: 8px; flex: 1;
  }
  article.post .date{
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted);
  }
  article.post h3{
    font-family: var(--sans); font-weight: 600; font-size: 18px; line-height: 1.25;
    letter-spacing: -0.015em; margin: 0; color: var(--maroon-ink);
  }
  article.post h3 em{font-style: normal; color: var(--coral);}
  article.post p{
    margin: 0; font-size: 14px; line-height: 1.5; color: var(--muted);
    flex: 1; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }
  article.post .foot{
    margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--rule);
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--coral);
    display: flex; justify-content: space-between; align-items: center;
  }

  /* LIST view (alt) */
  .list-view{
    display:flex; flex-direction:column;
  }
  .list-view article.post{
    border:0; border-bottom: 1px solid var(--rule); border-radius: 0;
    padding: 24px 0; background: transparent;
    flex-direction: row; gap: 28px; align-items: stretch;
    transition: background .15s;
  }
  .list-view article.post:hover{background: var(--cream); transform: none; box-shadow: none;}
  .list-view article.post .thumb{
    width: 220px; flex: none; aspect-ratio: 16/10; border-radius: 6px; overflow: hidden;
  }
  .list-view article.post .body{padding: 4px 0; gap: 6px;}
  .list-view article.post h3{font-size: 22px;}
  .list-view article.post p{-webkit-line-clamp: 2; font-size: 15px; max-width: 68ch;}
  .list-view article.post .foot{border-top: 0; padding-top: 0; margin-top: 6px;}

  /* pagination */
  .pager{
    display: flex; justify-content: center; align-items: center; gap: 8px;
    margin-top: 64px; padding-top: 40px; border-top: 1px solid var(--rule);
  }
  .pager button, .pager span.p{
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.1em;
    min-width: 38px; height: 38px; border-radius: 999px;
    border: 1px solid var(--rule); background: var(--paper); color: var(--maroon-ink);
    display: inline-flex; align-items: center; justify-content: center; padding: 0 12px;
    cursor: pointer;
  }
  .pager button:hover{border-color: var(--maroon);}
  .pager .p.on{background: var(--maroon); color: var(--cream); border-color: var(--maroon);}
  .pager .dots{border:0; background: transparent; color: var(--muted);}

  /* empty state */
  .empty{
    text-align: center; padding: 80px 20px;
    font-family: var(--mono); font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted);
  }
  .empty em{font-family: var(--serif); font-style: italic; font-size: 20px; color: var(--coral); text-transform: none; letter-spacing: 0; display:block; margin-top: 8px;}

  /* Tweaks panel */
  .tweaks{
    position: fixed; right: 24px; bottom: 24px; z-index: 90;
    width: 280px;
    background: var(--paper);
    border: 1px solid var(--rule-strong);
    border-radius: 10px;
    box-shadow: 0 24px 60px -20px rgba(42,18,27,0.35);
    padding: 18px 20px;
    font-size: 13px;
    display: none;
  }
  .tweaks.on{display: block;}
  .tweaks h4{
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted); margin: 0 0 14px;
    display:flex; justify-content:space-between;
  }
  .tweaks .field{margin-bottom: 14px;}
  .tweaks label{
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); display: block; margin-bottom: 6px;
  }
  .tweaks .seg{display: flex; gap: 4px; padding: 3px; border-radius: 999px; border: 1px solid var(--rule); background: var(--cream);}
  .tweaks .seg button{
    flex: 1; border: 0; background: transparent; cursor: pointer;
    font: inherit; padding: 6px 10px; border-radius: 999px;
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--maroon-ink);
  }
  .tweaks .seg button.on{background: var(--coral); color: var(--cream);}

  /* Tweakable thumbnail styles */
  .th-dots{
    background: var(--maroon);
    background-image: radial-gradient(circle, rgba(252,243,216,0.11) 1.8px, transparent 2.2px);
    background-size: 18px 18px;
  }
  .th-grid{
    background: var(--maroon);
    background-image:
      linear-gradient(to right, rgba(252,243,216,0.08) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(252,243,216,0.08) 1px, transparent 1px);
    background-size: 28px 28px;
  }
  .th-stripes{
    background: var(--coral);
    background-image: repeating-linear-gradient(-45deg, rgba(42,18,27,0.08) 0 12px, transparent 12px 24px);
  }
  .th-topo{
    background: var(--cream);
    background-image:
      radial-gradient(ellipse 70% 40% at 30% 60%, rgba(190,81,51,0.18) 0%, transparent 50%),
      radial-gradient(ellipse 50% 30% at 70% 30%, rgba(229,154,99,0.22) 0%, transparent 50%),
      radial-gradient(ellipse 60% 40% at 90% 80%, rgba(190,81,51,0.12) 0%, transparent 50%);
    color: var(--maroon);
  }
  .th-topo .glyph, .th-topo .tag{color: var(--maroon) !important;}
  .th-topo .tag{background: rgba(42,18,27,0.08) !important; color: var(--maroon) !important;}
</style>
</head>

  {"d":"May 19, 2025","t":"How to build an index with text embeddings","e":"Indexing text with CocoIndex and text embeddings, and querying it with natural language — the canonical starter tutorial.","tag":"Examples","g":"text-embed 101"},
  {"d":"May 8, 2025","t":"Story of CocoIndex, at 1k stars","e":"CocoIndex is the world's first open-source engine that supports both custom transformation logic and incremental processing specialized for data indexing. We just crossed 1k stars — thank you.","tag":"Announcement","g":"1k ★"},
  {"d":"May 7, 2025","t":"Build a Real-Time Product Recommendation Engine with LLM and Graph Database","e":"Build a real-time product recommendation engine with LLM and a graph database, from the aspect of product category (taxonomy) understanding.","tag":"Examples","g":"recs"},
  {"d":"April 30, 2025","t":"CocoIndex Changelog 2025-04-30","e":"CocoIndex updates: Knowledge Graphs, Qdrant, Supabase, KTable/LTable, and more LLM providers.","tag":"Changelog","g":"Apr 30"},
  {"d":"April 29, 2025","t":"Build a Real-Time Knowledge Graph for Documents with LLM","e":"CocoIndex now supports knowledge graphs with incremental processing. Building live knowledge for agents is super easy.","tag":"Examples","g":"docs → KG"},
  {"d":"April 7, 2025","t":"CocoIndex Changelog 2025-04-07","e":"CocoIndex updates: incremental processing with live update mode, evaluation utilities, date/time types, Google Drive, and core/performance improvements.","tag":"Changelog","g":"Apr 7"},
  {"d":"April 7, 2025","t":"Continuous update of derived data on source updates, automatically","e":"CocoIndex continuously watches source changes and keeps derived data in sync, with low latency and minimal performance overhead.","tag":"Feature","g":"continuous"},
  {"d":"April 6, 2025","t":"Incremental Processing with CocoIndex","e":"CocoIndex keeps an index up to date with source changes, super efficiently and with low latency — with the support of incremental processing.","tag":"Feature","g":"incremental"},
  {"d":"March 26, 2025","t":"Structured Extraction from Patient Intake Form with LLM","e":"Extract structured data from patient intake forms in PDF/Word with LLM by CocoIndex.","tag":"Examples","g":"intake v1"},
  {"d":"March 23, 2025","t":"Build text embeddings from Google Drive for RAG","e":"Tutorial to create text embeddings from docs in Google Drive, saved in vector stores for semantic search / RAG using CocoIndex.","tag":"Examples","g":"Drive → embed"},
  {"d":"March 20, 2025","t":"CocoIndex Changelog 2025-03-20","e":"First release of the CocoIndex Changelog: LLM support, codebase indexing, custom functions, and assorted core/performance improvements.","tag":"Changelog","g":"first"},
  {"d":"March 18, 2025","t":"Build Real-Time Codebase Indexing for AI Code Generation","e":"Indexing a codebase for RAG with CocoIndex and Tree-sitter in real-time: chunking, embedding, semantic search, and vector index for efficient retrieval.","tag":"Examples","g":"code RAG"},
  {"d":"March 17, 2025","t":"On-premise structured extraction with LLM using Ollama","e":"Use CocoIndex to extract structured data from PDF/Markdown with Ollama's local LLM models. All running on-premise without sending data to external APIs.","tag":"Examples","g":"Ollama"},
  {"d":"March 3, 2025","t":"We are officially open sourced","e":"CocoIndex is the world's first open-source engine that supports both custom transformation logic and incremental processing specialized for data indexing.","tag":"Announcement","g":"open source"},
  {"d":"February 20, 2025","t":"Customizable Data Indexing Pipelines","e":"Explaining what customizable data indexing pipelines are through comparisons and examples.","tag":"Insight","g":"custom pipelines"},
  {"d":"January 30, 2025","t":"What Makes Indexing Pipelines Different?","e":"Understanding the unique characteristics of indexing pipelines compared to other data processing systems. Why indexing requires special handling for incremental processing and persistence.","tag":"Insight","g":"what's different"},
  {"d":"January 20, 2025","t":"Handling System Updates and CocoIndex Automatic Schema Inference","e":"How CocoIndex handles system updates in indexing flows and our approach to automatic schema inference. The challenges of managing data and logic evolution.","tag":"Best Practices","g":"schema inference"},
  {"d":"January 10, 2025","t":"Processing Large Files in Data Indexing Systems","e":"Best practices for handling large files in data indexing systems. Processing granularity, fan-in/fan-out scenarios, and strategies for efficient processing of large datasets.","tag":"Best Practices","g":"large files"},
  {"d":"January 6, 2025","t":"Data Consistency in Indexing Pipelines","e":"The challenges and solutions for maintaining data consistency in indexing pipelines. Concurrent updates, data exposure risks, and best practices for reliable, up-to-date indexes.","tag":"Insight","g":"consistency"},
  {"d":"January 5, 2025","t":"Data Indexing and Common Challenges","e":"The fundamentals of data indexing pipelines for RAG applications. Key characteristics of effective indexing systems, common challenges in production, and how CocoIndex solves them.","tag":"Insight","g":"common challenges"},
  {"d":"January 4, 2025","t":"CocoIndex — A Data Indexing Platform for AI Applications","e":"How CocoIndex simplifies data indexing for AI applications. A comprehensive platform that handles data ingestion, processing, and management for RAG, semantic search, and other AI use cases.","tag":"Insight","g":"intro"},
  {"d":"January 2, 2025","t":"Welcome to CocoIndex","e":"Welcome to the official CocoIndex blog. We're excited to share our journey in building high-performance indexing infrastructure for AI applications.","tag":"Announcement","g":"welcome"}
]
</script>

<script type="text/babel">
const { useState, useMemo, useEffect } = React;

// ── tweakable thumbnail pattern & italic-emphasis logic ───────────
const TWEAKS = /*EDITMODE-BEGIN*/{
  "thumb_pattern": "dots",
  "view": "grid",
  "per_page": 12
}/*EDITMODE-END*/;

// tag → class mapping: one of dots/grid/stripes/topo, deterministic
const TAG_STYLE = {
  "Examples":       "dots",
  "Changelog":      "grid",
  "Feature":        "dots",
  "Insight":        "topo",
  "Best Practices": "grid",
  "Announcement":   "stripes"
};

const POSTS = JSON.parse(document.getElementById("posts-data").textContent);

// Slug lookup, in exact data order — used to build the real OG thumbnail URL.
const SLUGS = [
  "podcast-to-knowledge-graph","type-guided-serde","building-an-invisible-daemon","changelog-0327-0334",
  "cocoindex-joins-security-github-secure-open-source-fund","sec-edgar-analytics","multi-codebase-summarization",
  "slides-to-speech","changelog-0311-0326","extraction-dspy","meeting-notes-graph","hackernews-trending-topics",
  "changelog-0310","custom-source-hackernews","extraction-baml","batching","data-for-ai","pdf-elements",
  "custom-source","cocoindex-changelog-2025-10-19","etl-to-snowflake","rust-ownership-access","query-support",
  "postgres-source","multi-format-indexing","cocoindex-changelog-2025-08-18","flow-control","colpali",
  "multi-vector","custom-targets","face-detection","academic-papers-indexing","cocoindex-changelog-2025-07-07",
  "cocoinsight","schema-inference-for-qdrant","kuzu-integration","cocoindex-changelog-2025-05-31",
  "s3-incremental-etl","live-image-search","text-embeddings-101","cocoindex-1k","product-recommendation",
  "cocoindex-changelog-2025-04-30","knowledge-graph-for-docs","cocoindex-changelog-2025-04-07",
  "continuous-updates","incremental-processing","patient-intake-form-extraction-with-llm",
  "text-embedding-from-google-drive","cocoindex-changelog-2025-03-20","index-code-base-for-rag",
  "cocoindex-ollama-structured-extraction-from-pdf","cocoindex-open-source","data-indexing-custom-logic",
  "what-makes-indexing-pipelines-different","handle-system-update-for-indexing-flow",
  "indexing-for-single-large-file","indexing-data-consistency","data-indexing-and-common-challenges",
  "cocoindex-data-indexing-platform","welcome"
];
POSTS.forEach((p, i) => { p.slug = SLUGS[i]; p.img = `https://cocoindex.io/blogs/img/bloglist/${SLUGS[i]}.png`; });

// pre-compute tag counts
const TAG_COUNTS = POSTS.reduce((a, p) => (a[p.tag] = (a[p.tag] || 0) + 1, a), {});
const TAG_ORDER = ["Examples", "Changelog", "Insight", "Feature", "Best Practices", "Announcement"];

// emphasize one word in each title with italic-coral
// (matches the brand: italic coral carries "the zing")
function emphasize(title){
  // Pick the most interesting noun-ish word — heuristic: the last word ≥ 5 chars
  // that isn't Changelog / version-y. Falls back to last word.
  const words = title.split(/(\s+)/); // keep spaces
  const tokens = words.filter(w => !/^\s+$/.test(w));
  const pickable = tokens
    .map((w, i) => ({ w, i, bare: w.replace(/[^\w]/g, "") }))
    .filter(o => o.bare.length >= 5 && !/^\d/.test(o.bare))
    .filter(o => !/CocoIndex|Changelog|Python|LLM|BAML|DSPy|YouTube|Google|HackerNews|Apache|Doris|LanceDB|Neo4j|Postgres|Qdrant|Snowflake|Ollama|ColPali|Kuzu|GitHub|CocoInsight/i.test(o.bare));
  if (!pickable.length) return [title];
  const pick = pickable[Math.max(0, pickable.length - 1)];
  return [
    tokens.slice(0, pick.i).join(" "),
    " ",
    <em key="em">{pick.w}</em>,
    " ",
    tokens.slice(pick.i + 1).join(" ")
  ];
}

const Thumb = ({ pattern, tag, glyph, src, className = "" }) => {
  const [failed, setFailed] = useState(false);
  const patternClass = `th-${pattern}`;
  return (
    <div className={`thumb ${patternClass} ${className}`}>
      {src && !failed && (
        <img
          src={src}
          alt=""
          loading="lazy"
          onError={() => setFailed(true)}
          style={{position:"absolute", inset:0, width:"100%", height:"100%", objectFit:"cover", zIndex:1}}
        />
      )}
      <span className="tag" style={{zIndex:3}}>{tag}</span>
      {(!src || failed) && <span className="glyph serif" style={{zIndex:2}}>{glyph}</span>}
    </div>
  );
};

const FeaturedCard = ({ p, pattern }) => (
  <article className="featured" data-screen-label="Featured post">
    <Thumb pattern={pattern} tag={`Featured · ${p.tag}`} glyph={p.g} src={p.img}/>
    <div className="body">
      <div className="meta">
        <span>{p.d}</span>
        <span>·</span>
        <span>8 min read</span>
      </div>
      <h2>{emphasize(p.t)}</h2>
      <p>{p.e}</p>
      <div className="read">
        <span>Read the post</span>
        <span>→</span>
      </div>
    </div>
  </article>
);

const PostCard = ({ p, pattern }) => (
  <article className="post">
    <Thumb pattern={pattern} tag={p.tag} glyph={p.g} src={p.img} className="card-thumb"/>
    <div className="body">
      <span className="date">{p.d}</span>
      <h3>{emphasize(p.t)}</h3>
      <p>{p.e}</p>
      <div className="foot">
        <span>Read</span>
        <span>→</span>
      </div>
    </div>
  </article>
);

const Pager = ({ page, total, onGo }) => {
  const pages = [];
  const push = (n) => pages.push(n);
  const last = total;
  push(1);
  if (page > 3) push("...");
  for (let n = Math.max(2, page - 1); n <= Math.min(last - 1, page + 1); n++) push(n);
  if (page < last - 2) push("...");
  if (last > 1) push(last);
  return (
    <nav className="pager" aria-label="Pagination">
      <button onClick={() => onGo(Math.max(1, page - 1))} disabled={page === 1}>← Prev</button>
      {pages.map((n, i) => n === "..."
        ? <span key={`d${i}`} className="p dots">···</span>
        : <span key={n} className={`p ${n === page ? "on" : ""}`} onClick={() => onGo(n)}>{n}</span>
      )}
      <button onClick={() => onGo(Math.min(last, page + 1))} disabled={page === last}>Next →</button>
    </nav>
  );
};

function Page() {
  const [q, setQ] = useState("");
  const [activeTag, setActiveTag] = useState("All");
  const [page, setPage] = useState(1);
  const [view, setView] = useState(TWEAKS.view);
  const [pattern, setPattern] = useState(TWEAKS.thumb_pattern);
  const [tweaksOpen, setTweaksOpen] = useState(false);

  // persist page, filter
  useEffect(() => { try { localStorage.setItem("cc_blog_state", JSON.stringify({ page, activeTag, view, pattern })); } catch {} }, [page, activeTag, view, pattern]);
  useEffect(() => {
    try {
      const s = JSON.parse(localStorage.getItem("cc_blog_state") || "{}");
      if (s.page) setPage(s.page);
      if (s.activeTag) setActiveTag(s.activeTag);
      if (s.view) setView(s.view);
      if (s.pattern) setPattern(s.pattern);
    } catch {}
  }, []);

  // Tweaks edit mode hookup
  useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === "__activate_edit_mode") setTweaksOpen(true);
      if (d.type === "__deactivate_edit_mode") setTweaksOpen(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);
  const persistTweak = (edits) => {
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits }, "*");
  };

  // filter
  const filtered = useMemo(() => {
    const Q = q.trim().toLowerCase();
    return POSTS.filter(p =>
      (activeTag === "All" || p.tag === activeTag) &&
      (!Q || p.t.toLowerCase().includes(Q) || p.e.toLowerCase().includes(Q) || p.tag.toLowerCase().includes(Q))
    );
  }, [q, activeTag]);

  // Reset to page 1 when filter changes
  useEffect(() => { setPage(1); }, [q, activeTag]);

  const perPage = TWEAKS.per_page;
  const total = Math.max(1, Math.ceil(Math.max(filtered.length - 1, 0) / perPage));
  // First post is featured when unfiltered on page 1
  const showFeatured = activeTag === "All" && q.trim() === "" && page === 1;
  const rest = showFeatured ? filtered.slice(1) : filtered;
  const start = (page - 1) * perPage;
  const pageSlice = showFeatured && page === 1
    ? rest.slice(0, perPage - 1)
    : rest.slice(start - (showFeatured ? 1 : 0), start - (showFeatured ? 1 : 0) + perPage);

  const patternFor = (p) => pattern === "mixed" ? (TAG_STYLE[p.tag] || "dots") : pattern;

  return (
    <>
      <NavBar active="blog" />

      <header className="blog-hero-top wrap">
        <div className="bits">
          <div>
            <span className="caps">Writing · from the CocoIndex team</span>
            <h1>The <em>blog.</em></h1>
          </div>
          <p className="sub">
            Examples, changelogs, and the occasional deep-dive into incremental
            processing. Written for tired engineers, by the people who index their own inboxes.
          </p>
        </div>
        <div className="count">
          <span><b>{POSTS.length}</b> posts</span>
          <span><b>{Object.keys(TAG_COUNTS).length}</b> topics</span>
          <span>Updated <b>April 2, 2026</b></span>
          <span>RSS · <a href="#" style={{color:"var(--coral)"}}>/rss.xml</a></span>
        </div>
      </header>

      <div className="controls">
        <div className="wrap">
          <div className="row">
            <div className="search">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>
              </svg>
              <input
                placeholder="Search 61 posts — try 'knowledge graph' or 'custom source'…"
                value={q}
                onChange={e => setQ(e.target.value)}
              />
              <span className="kb">⌘K</span>
            </div>
            <div className="tags">
              <button className={`tag-btn ${activeTag==="All"?"on":""}`} onClick={()=>setActiveTag("All")}>
                All <span className="n">{POSTS.length}</span>
              </button>
              {TAG_ORDER.map(t => (
                <button key={t} className={`tag-btn ${activeTag===t?"on":""}`} onClick={()=>setActiveTag(t)}>
                  {t} <span className="n">{TAG_COUNTS[t] || 0}</span>
                </button>
              ))}
            </div>
            <div style={{marginLeft:"auto"}} className="view-toggle">
              <button className={view==="grid"?"on":""} onClick={()=>setView("grid")}>Grid</button>
              <button className={view==="list"?"on":""} onClick={()=>setView("list")}>List</button>
            </div>
          </div>
        </div>
      </div>

      <main className="list wrap">
        {filtered.length === 0 && (
          <div className="empty">
            Nothing matches that.
            <em>Try a broader term, or clear the filter.</em>
          </div>
        )}

        {showFeatured && filtered.length > 0 && (
          <FeaturedCard p={filtered[0]} pattern={patternFor(filtered[0])}/>
        )}

        {filtered.length > 0 && (
          <div className={view === "list" ? "list-view" : "grid"}>
            {pageSlice.map((p, i) => (
              <PostCard key={`${p.d}-${i}`} p={p} pattern={patternFor(p)}/>
            ))}
          </div>
        )}

        {filtered.length > perPage && (
          <Pager page={page} total={total} onGo={(n) => { setPage(n); window.scrollTo({top: 0, behavior:"smooth"}); }}/>
        )}
      </main>

      <Footer/>

      <div className={`tweaks ${tweaksOpen ? "on" : ""}`}>
        <h4><span>Tweaks</span><span onClick={()=>setTweaksOpen(false)} style={{cursor:"pointer"}}>✕</span></h4>
        <div className="field">
          <label>Thumbnail pattern</label>
          <div className="seg">
            {["dots", "grid", "stripes", "topo", "mixed"].map(p => (
              <button key={p} className={pattern===p?"on":""} onClick={()=>{setPattern(p); persistTweak({thumb_pattern: p});}}>{p}</button>
            ))}
          </div>
        </div>
        <div className="field">
          <label>Layout</label>
          <div className="seg">
            {["grid", "list"].map(v => (
              <button key={v} className={view===v?"on":""} onClick={()=>{setView(v); persistTweak({view: v});}}>{v}</button>
            ))}
          </div>
        </div>
        <p style={{fontFamily:"var(--mono)", fontSize:10, letterSpacing:"0.1em", color:"var(--muted)", textTransform:"uppercase", margin:0, paddingTop:8, borderTop:"1px solid var(--rule)"}}>
          Patterns persist to disk · mixed = by tag
        </p>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Page/>);
</script>

</body>
</html>
