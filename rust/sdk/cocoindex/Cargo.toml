[package]
name = "cocoindex"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[features]
postgres = ["dep:serde_json", "dep:sqlx"]
surrealdb = ["dep:serde_json", "dep:surrealdb"]

[dependencies]
cocoindex_macros = { path = "../cocoindex_macros" }
cocoindex_core = { path = "../../core", package = "cocoindex_core" }
cocoindex_utils = { path = "../../utils", package = "cocoindex_utils" }
thiserror = "2"
bytes = "1"
serde = { version = "1", features = ["derive"] }
rmp-serde = "1"
tokio = { version = "1", features = ["fs", "sync"] }
futures = "0.3"
tracing = "0.1"
globset = "0.4"
walkdir = "2"
async-trait = "0.1"
rustc-hash = "2.1.1"
uuid = { workspace = true }
serde_json = { version = "1", optional = true }
sqlx = { version = "0.9", default-features = false, optional = true, features = [
    "runtime-tokio",
    "tls-rustls",
    "postgres",
] }
surrealdb = { version = "3", default-features = false, optional = true, features = [
    "protocol-ws",
    "rustls",
] }

[dev-dependencies]
tempfile = "3"
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
criterion = "0.5"
glob = "0.3"

[[bench]]
name = "sdk_microbench"
harness = false
