[package]
name = "cocoindex"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[features]
postgres = ["dep:serde_json", "dep:sqlx", "dep:chrono"]
surrealdb = ["dep:serde_json", "dep:surrealdb"]
kafka = ["dep:rskafka", "dep:chrono"]
google_drive = ["dep:serde_json", "dep:reqwest", "dep:rsa", "dep:sha2", "dep:base64"]

[dependencies]
cocoindex_macros = { path = "../cocoindex_macros" }
cocoindex_core = { path = "../../core", package = "cocoindex_core" }
cocoindex_utils = { path = "../../utils", package = "cocoindex_utils" }
thiserror = "2"
bytes = "1"
serde = { version = "1", features = ["derive"] }
rmp-serde = "1"
tokio = { version = "1", features = ["fs", "sync"] }
futures = "0.3"
tracing = "0.1"
globset = "0.4"
walkdir = "2"
async-trait = "0.1"
rustc-hash = "2.1.1"
uuid = { workspace = true }
serde_json = { version = "1", optional = true }
sqlx = { version = "0.8", default-features = false, optional = true, features = [
    "runtime-tokio",
    "tls-rustls",
    "postgres",
    "chrono",
] }
chrono = { version = "0.4", default-features = false, optional = true }
rskafka = { version = "0.6", default-features = false, optional = true }
# Google Drive source: HTTP (native-tls = macOS Security.framework, no cmake)
# + pure-Rust RS256 JWT signing for service-account auth.
reqwest = { version = "0.12", features = ["json"], optional = true }
rsa = { version = "0.9", features = ["sha2", "pem"], optional = true }
sha2 = { version = "0.10", optional = true }
base64 = { version = "0.22", optional = true }
surrealdb = { version = "3", default-features = false, optional = true, features = [
    "protocol-ws",
    "rustls",
] }

[dev-dependencies]
tempfile = "3"
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
criterion = "0.5"
glob = "0.3"
# Used by the live Kafka integration test to consume produced records back.
rskafka = { version = "0.6", default-features = false }
# Hermetic mock HTTP server for the Google Drive source integration test.
wiremock = "0.6"

[[bench]]
name = "sdk_microbench"
harness = false
