[package]
name = "cocoindex_core"
version = { workspace = true }
edition = { workspace = true }
rust-version = { workspace = true }
license = { workspace = true }

[dependencies]
cocoindex_utils = { path = "../utils", features = ["reqwest"] }

anyhow = { workspace = true }
bytes = { workspace = true }
env_logger = { workspace = true }
heed = "0.22.0"
# Page-size lookup for aligning the LMDB map size; matches the crate heed uses
# internally to validate `map_size` against the system page size.
page_size = "0.6"
nix = { workspace = true }
storekey = { workspace = true }
serde = { workspace = true, features = ["rc", "derive"] }
tokio = { workspace = true }
tokio-stream = { workspace = true }
rmp = { workspace = true }
rmp-serde = { workspace = true }
rpds = { workspace = true }
serde_bytes = { workspace = true }
serde_with = { workspace = true }
uuid = { workspace = true }
indexmap = { workspace = true }

tokio-util = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
futures = { workspace = true }
async-trait = { workspace = true }
parking_lot = { workspace = true }
rand = { workspace = true }

[features]
# Extra store hooks for the state-store read benchmarks (see the SDK crate's
# `state_store_read` bench). Never enabled by production dependents.
bench-support = []

[dev-dependencies]
serde_json = { workspace = true }
axum = { workspace = true }
tempfile = "3"
