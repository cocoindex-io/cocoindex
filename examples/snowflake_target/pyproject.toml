[project]
name = "snowflake-target"
version = "0.1.0"
description = "CocoIndex example: write managed target rows to Snowflake."
requires-python = ">=3.11"
dependencies = [
    "cocoindex[snowflake]>=1.0.7",
    "python-dotenv>=1.0.1",
    "snowflake-connector-python>=3.0.0",
]

[tool.setuptools]
py-modules = ["main"]
