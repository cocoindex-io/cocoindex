[workspace]

[package]
name = "conversation-to-knowledge"
version = "0.1.0"
edition = "2024"

[dependencies]
cocoindex = { path = "../../../rust/sdk/cocoindex", features = ["surrealdb"] }
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# OpenAI (structured extraction + entity-pair confirmation) and AssemblyAI REST.
reqwest = { version = "0.12", features = ["json", "multipart"] }
# Local embeddings for entity resolution.
fastembed = "4"
hf-hub = "0.4"
# Knowledge graph store, via the SDK SurrealDB target connector.
surrealdb = { version = "3", default-features = false, features = [
    "protocol-ws",
    "rustls",
] }
dotenvy = "0.15"
tempfile = "3"
