[workspace]

[package]
name = "conversation-to-knowledge"
version = "0.1.0"
edition = "2024"

[dependencies]
cocoindex = { path = "../../../rust/sdk/cocoindex" }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# OpenAI (structured extraction + entity-pair confirmation) and AssemblyAI REST.
reqwest = { version = "0.12", features = ["json", "multipart"] }
# Local embeddings for entity resolution (same fastembed model family as code-embedding).
fastembed = "4"
# Knowledge graph store (nodes + RELATE edges), via the official client with safe binds.
surrealdb = { version = "3", default-features = false, features = [
    "protocol-ws",
    "rustls",
] }
dotenvy = "0.15"
