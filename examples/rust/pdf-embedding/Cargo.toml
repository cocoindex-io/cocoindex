[workspace]

[package]
name = "pdf-embedding"
version = "0.1.0"
edition = "2024"

[dependencies]
cocoindex = { path = "../../../rust/sdk/cocoindex", features = ["postgres"] }
cocoindex_ops_text = { path = "../../../rust/ops_text" }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
# Local embeddings (same all-MiniLM-L6-v2 model as the Python example).
fastembed = "4"
# PDF text extraction (Rust-native stand-in for Python's docling converter).
lopdf = "0.40"
# Query path (pgvector similarity); target writes go through cocoindex::postgres.
sqlx = { version = "0.8", default-features = false, features = [
    "runtime-tokio",
    "tls-rustls",
    "postgres",
] }
dotenvy = "0.15"
