[workspace]

[package]
name = "text-embedding-lancedb"
version = "0.1.0"
edition = "2024"

[dependencies]
cocoindex = { path = "../../../rust/sdk/cocoindex", features = [
    "lancedb",
    "text",
    "fastembed",
] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
dotenvy = "0.15"
