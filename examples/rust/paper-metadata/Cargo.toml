[workspace]

[package]
name = "paper-metadata"
version = "0.1.0"
edition = "2024"

[dependencies]
cocoindex = { path = "../../../rust/sdk/cocoindex", features = [
    "postgres",
    "text",
    "fastembed",
] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# LLM metadata extraction (OpenAI chat completions, JSON mode).
reqwest = { version = "0.12", features = ["json"] }
# PDF parsing: page count + first-page text extraction.
lopdf = "0.40"
# Query path (pgvector similarity); target writes go through cocoindex::postgres.
sqlx = { version = "0.8", default-features = false, features = [
    "runtime-tokio",
    "tls-rustls",
    "postgres",
] }
dotenvy = "0.15"
