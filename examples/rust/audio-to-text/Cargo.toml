[workspace]

[package]
name = "audio-to-text"
version = "0.1.0"
edition = "2024"

[dependencies]
cocoindex = { path = "../../../rust/sdk/cocoindex", features = ["postgres"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# OpenAI audio-transcription REST (Whisper) via multipart upload.
reqwest = { version = "0.12", features = ["json", "multipart"] }
dotenvy = "0.15"
