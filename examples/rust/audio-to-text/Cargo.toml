[workspace]

[package]
name = "audio-to-text"
version = "0.1.0"
edition = "2024"

[dependencies]
# `embed_api` pulls in the SDK `ops::api::ApiTranscriber` (Whisper over an
# OpenAI-compatible HTTP API) so this example no longer hand-rolls the request.
cocoindex = { path = "../../../rust/sdk/cocoindex", features = [
    "postgres",
    "embed_api",
] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
dotenvy = "0.15"
