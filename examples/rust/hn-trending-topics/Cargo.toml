[workspace]

[package]
name = "hn-trending-topics"
version = "0.1.0"
edition = "2024"

[dependencies]
cocoindex = { path = "../../../rust/sdk/cocoindex", features = ["postgres"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Algolia HN API (public, no key) + OpenAI topic extraction.
reqwest = { version = "0.12", features = ["json"] }
# Postgres store (no pgvector here, so plain sqlx 0.8).
sqlx = { version = "0.8", default-features = false, features = [
    "runtime-tokio",
    "tls-rustls",
    "postgres",
] }
dotenvy = "0.15"
