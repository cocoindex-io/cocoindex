[workspace]

[package]
name = "csv-to-kafka"
version = "0.1.0"
edition = "2024"

[dependencies]
cocoindex = { path = "../../../rust/sdk/cocoindex", features = ["kafka"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
csv = "1"
dotenvy = "0.15"
# Used only by the `consume` subcommand to read messages back for the demo.
rskafka = { version = "0.6", default-features = false }
