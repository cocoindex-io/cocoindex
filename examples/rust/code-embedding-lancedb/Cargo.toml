[workspace]

[package]
name = "code-embedding-lancedb"
version = "0.1.0"
edition = "2024"

[dependencies]
# `text` + `fastembed` pull in the SDK ops facades (RecursiveSplitter,
# detect_code_language, and the SentenceTransformerEmbedder) so this example no
# longer hand-rolls chunking or the fastembed plumbing.
cocoindex = { path = "../../../rust/sdk/cocoindex", features = [
    "lancedb",
    "text",
    "fastembed",
] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
dotenvy = "0.15"
