[workspace]

[package]
name = "code-embedding"
version = "0.1.0"
edition = "2024"

[dependencies]
# `text` + `fastembed` pull in the SDK ops facades (RecursiveSplitter +
# language detection, and the SentenceTransformerEmbedder) so this example no
# longer depends on the engine ops crate or fastembed directly.
cocoindex = { path = "../../../rust/sdk/cocoindex", features = [
    "postgres",
    "text",
    "fastembed",
] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
# Postgres query path. Target writes go through cocoindex::postgres.
sqlx = { version = "0.8", default-features = false, features = [
    "runtime-tokio",
    "tls-rustls",
    "postgres",
] }
dotenvy = "0.15"
