name: Release Docs (INTERNAL)

on:
  workflow_call:

permissions:
  contents: read
  pages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: docs-release
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json
      - uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.GH_PAGES_DEPLOY }}
      - name: Install dependencies
        run: npm --prefix docs ci
      - name: Build docs site
        run: npm --prefix docs run build
      - name: Deploy to cocoindex-io/docs gh-pages
        env:
          DEPLOY_USER_EMAIL: ${{ vars.COCOINDEX_DOCS_DEPLOY_USER_EMAIL }}
          DEPLOY_USER_NAME: ${{ vars.COCOINDEX_DOCS_DEPLOY_USER_NAME }}
          TARGET_REPO: git@github.com:cocoindex-io/docs.git
        run: |
          set -euo pipefail
          git config --global user.email "$DEPLOY_USER_EMAIL"
          git config --global user.name "$DEPLOY_USER_NAME"

          TMP=$(mktemp -d)
          if ! git clone --depth 1 --branch gh-pages "$TARGET_REPO" "$TMP"; then
            # First deploy: seed an empty gh-pages branch.
            git clone --depth 1 "$TARGET_REPO" "$TMP"
            cd "$TMP"
            git checkout --orphan gh-pages
            git rm -rf . || true
            cd -
          fi

          # Replace contents, preserving the CNAME file (domain mapping)
          # and .git so the branch history continues.
          find "$TMP" -mindepth 1 -maxdepth 1 \
            ! -name .git ! -name CNAME -exec rm -rf {} +
          cp -a docs/dist/. "$TMP/"

          cd "$TMP"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy."
            exit 0
          fi
          git commit -m "deploy docs from ${GITHUB_SHA::7}"
          git push origin gh-pages
